name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build

  rust:
    # Buddio is Windows-only (VB-CABLE, Win32 hotkeys, WASAPI) — building on
    # ubuntu-latest just fails on tauri's GTK/glib system deps before it ever
    # reaches Buddio's own code, and wouldn't validate the Windows-specific
    # paths (#[cfg(windows)]) even if it did compile.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      # tauri's build.rs checks that every bundle.resources path in
      # tauri.conf.json exists, even for `cargo check`/clippy/test — not just
      # `tauri build` — so this has to run before any cargo command.
      - name: Fetch VB-CABLE driver pack
        run: bun run fetch:vbcable
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace
