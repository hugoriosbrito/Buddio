name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> ../target"

      - run: bun install --frozen-lockfile

      - name: Fetch VB-CABLE driver pack
        run: bun run fetch:vbcable

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Buddio ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --bundles nsis
          # Optional Authenticode: set WINDOWS_CERTIFICATE* secrets and wire
          # signing in a follow-up step (see docs/release.md).
          # NSIS installs VB-CABLE on setup and removes it on uninstall when
          # Buddio owned that install (see src-tauri/windows/hooks.nsh).
