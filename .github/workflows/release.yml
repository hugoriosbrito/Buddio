name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: "src-tauri -> ../target"

      - run: bun install --frozen-lockfile

      - name: Fetch VB-CABLE driver pack
        run: bun run fetch:vbcable

      - uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Buddio ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --bundles nsis
          # Optional Authenticode: set WINDOWS_CERTIFICATE* secrets and wire
          # signing in a follow-up step (see docs/release.md).
          # NSIS installs VB-CABLE on setup and removes it on uninstall when
          # Buddio owned that install (see src-tauri/windows/hooks.nsh).
